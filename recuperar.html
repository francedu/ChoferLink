<!doctype html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Recuperar contraseña | ChoferLink</title><link rel="stylesheet" href="/styles.css"></head><body><header class="navbar"><a class="brand" href="/">🚚 ChoferLink</a><nav><a href="/empresa">Empresas</a><a href="/registro">Registro</a></nav></header><main class="section"><div class="panel auth-panel"><p class="eyebrow">Seguridad</p><h1>Recuperar contraseña</h1><p>Ingresa el email de tu cuenta. Si existe, enviaremos un enlace seguro válido por 24 horas.</p><form id="forgotForm" class="form"><select name="user_type" required><option value="company">Empresa</option><option value="profile">Trabajador / perfil</option></select><input type="email" name="email" placeholder="tu@email.cl" required><button class="btn primary">Enviar enlace</button><p id="forgotMsg" class="msg"></p></form></div></main><script>document.getElementById('forgotForm').addEventListener('submit',async e=>{e.preventDefault();const msg=document.getElementById('forgotMsg');msg.textContent='Enviando...';const data=Object.fromEntries(new FormData(e.target).entries());try{const r=await fetch('/api/password/forgot',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});const j=await r.json();if(!r.ok)throw new Error(j.error||'No se pudo enviar.');msg.textContent=j.message||'Revisa tu correo.';}catch(err){msg.textContent=err.message}})</script></body></html>
