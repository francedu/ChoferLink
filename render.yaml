services:
  - type: web
    name: choferlink
    env: node
    plan: free
    buildCommand: npm ci
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_CLIENT
        value: postgres
      - key: DATABASE_URL
        fromDatabase:
          name: choferlink-db
          property: connectionString
      - key: CORS_ORIGINS
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_TOKEN
        generateValue: true
      - key: BILLING_MODE
        value: payment
      - key: FLOW_API_KEY
        sync: false
      - key: FLOW_SECRET_KEY
        sync: false
      - key: FLOW_BASE_URL
        value: https://sandbox.flow.cl/api
      - key: PUBLIC_APP_URL
        sync: false
      - key: FLOW_RETURN_URL
        sync: false
      - key: FLOW_CONFIRM_URL
        sync: false
      - key: PLAN_PAID_AMOUNT_CLP
        value: 19990
      - key: SEED_DEMO
        value: false

databases:
  - name: choferlink-db
    plan: free
